<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LUARMOR | HEAVY OBFUSCATION (LUARPH GRADE)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            font-family: 'Inter', 'Segoe UI', 'Fira Code', monospace;
            color: #e3e6f0;
            line-height: 1.5;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .verification-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .verification-card {
            background: #11131c;
            border: 1px solid #a855f7;
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 40px rgba(168,85,247,0.3);
        }

        .verification-card h2 {
            margin-bottom: 1rem;
            color: #c084fc;
        }

        .discord-input {
            background: #0a0c12;
            border: 1px solid #3b4259;
            border-radius: 0.6rem;
            padding: 0.8rem;
            width: 100%;
            color: white;
            font-family: monospace;
            margin-bottom: 1rem;
        }

        .join-btn {
            display: inline-block;
            background: #5865F2;
            color: white;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 0.6rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .verify-btn {
            background: #7c3aed;
            border: none;
            width: 100%;
            padding: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        .error-msg {
            color: #f87171;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }

        .hidden {
            display: none !important;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2e3f;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo span {
            color: #e3e6f0;
            background: none;
        }

        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .card {
            background: #11131c;
            border: 1px solid #252a3a;
            border-radius: 1.2rem;
            padding: 1.5rem;
        }

        .card-header {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #2a2e3f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea, select {
            background: #0a0c12;
            border: 1px solid #2a2e3f;
            border-radius: 0.6rem;
            padding: 0.7rem;
            color: #e3e6f0;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            width: 100%;
        }

        button {
            background: #1e2130;
            border: 1px solid #3b4259;
            color: #e3e6f0;
            padding: 0.6rem 1.2rem;
            border-radius: 0.6rem;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-primary {
            background: #7c3aed;
            border-color: #a855f7;
        }

        .options-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 0.75rem 0;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
        }

        .output-area {
            background: #0a0c12;
            border-radius: 0.6rem;
            padding: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 500px;
            overflow: auto;
        }

        .copy-btn {
            background: #1e2130;
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #7e849c;
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            border-top: 1px solid #2a2e3f;
            padding-top: 1.5rem;
            font-size: 0.7rem;
        }

        @media (max-width: 800px) {
            .grid-2col {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div id="verificationModal" class="verification-overlay">
    <div class="verification-card">
        <h2>🔐 DISCORD VERIFICATION REQUIRED</h2>
        <p>Join the official LUARMOR Discord server to access HEAVY obfuscation.</p>
        <a href="https://discord.gg/mUvaDx8uuv" target="_blank" class="join-btn">📢 JOIN DISCORD</a>
        <input type="text" id="discordUsername" class="discord-input" placeholder="Discord Username">
        <button id="verifyBtn" class="verify-btn">✓ VERIFY</button>
        <div id="verifyError" class="error-msg"></div>
    </div>
</div>

<div id="mainContent" class="container hidden">
    <div class="navbar">
        <div class="logo">LU<span>ARMOR</span> | HEAVY</div>
        <div class="nav-links">
            <a href="#">OBFUSCATE</a>
            <a href="#">VM</a>
            <a href="#">LICENSE</a>
        </div>
    </div>

    <div class="grid-2col">
        <div class="card">
            <div class="card-header">
                <span>📜 INPUT SCRIPT</span>
            </div>
            <textarea id="inputScript" rows="10" placeholder="-- Lua code&#10;print('Hello')&#10;local x = 42&#10;function add(a,b) return a+b end"></textarea>
            <div class="options-row">
                <select id="heavyLevel">
                    <option value="max" selected>HEAVY (LUARPH GRADE - MAX)</option>
                    <option value="extreme">EXTREME (SLOWEST)</option>
                </select>
                <button id="obfuscateBtn" class="btn-primary">▶ HEAVY OBFUSCATE</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span>🔒 PROTECTED OUTPUT</span>
                <button id="copyOutputBtn" class="copy-btn">📋 COPY</button>
            </div>
            <div id="outputContent" class="output-area">-- HEAVY obfuscated code --</div>
            <div class="stats">
                <span id="statsSize">Original: 0 B</span>
                <span id="statsObfSize">Obfuscated: 0 B</span>
                <span id="statsRatio">Ratio: 0x</span>
            </div>
        </div>
    </div>
    <footer>LUARMOR | VERIFIED: <span id="displayUsername">NONE</span></footer>
</div>

<script>
(function(){
    const VERIFIED_KEY = 'luarmor_heavy_user';

    function rndStr(len){
        let s='';
        const c='_abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
        for(let i=0;i<len;i++) s+=c[Math.floor(Math.random()*c.length)];
        return s;
    }

    function heavyRename(code){
        let kw=new Set(['and','break','do','else','elseif','end','false','for','function','if','in','local','nil','not','or','repeat','return','then','true','until','while','goto']);
        let map=new Map();
        let newCode=code;
        let reLocal=/local\s+([a-zA-Z_][a-zA-Z0-9_]*)/g;
        let m;
        while((m=reLocal.exec(code))!==null){
            let v=m[1];
            if(!kw.has(v)&&!map.has(v)) map.set(v,rndStr(20));
        }
        let reFunc=/function\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*\(/g;
        while((m=reFunc.exec(code))!==null){
            let f=m[1];
            if(!kw.has(f)&&!map.has(f)) map.set(f,rndStr(20));
        }
        for(let [orig,newV] of map.entries()){
            let re=new RegExp(`\\b${orig}\\b`,'g');
            newCode=newCode.replace(re,newV);
        }
        return newCode;
    }

    function xorStringEncode(code){
        let strRe=/(["'])((?:(?=(\\?))\3.)*?)\1/g;
        return code.replace(strRe,(match,q,content)=>{
            let dec=content.replace(/\\(.)/g,(_,e)=>{
                if(e==='n') return '\n';
                if(e==='t') return '\t';
                if(e==='\\') return '\\';
                if(e==='"') return '"';
                if(e==="'") return "'";
                return e;
            });
            let bytes=[];
            for(let i=0;i<dec.length;i++) bytes.push(dec.charCodeAt(i));
            let key=Math.floor(Math.random()*0xFF);
            let xored=bytes.map(b=>b^key);
            return `(load(function(t,k)local s=''for i=1,#t do s=s..string.char(t[i]~k)end return s end)({${xored.join(',')}},${key}))()`;
        });
    }

    function flattenHeavy(code){
        let blocks=code.split('\n');
        let flat='do local __s=1 while __s~=0 do if __s==1 then\n';
        flat+=code+'\n__s=0\nend end end';
        return flat;
    }

    function deadCodeHeavy(code){
        let lines=code.split('\n');
        let out=[];
        for(let i=0;i<lines.length;i++){
            out.push(lines[i]);
            if(i%2===0 && lines[i].trim().length>0){
                out.push(`if (${Math.random()*1e6}|0)~=${Math.random()*1e6|0} then local _d=${Math.random().toString(36)} end`);
                out.push(`do local _x=false while not _x do _x=true end end`);
            }
        }
        return out.join('\n');
    }

    function opaquePredHeavy(code){
        let a=Math.floor(Math.random()*1e5);
        let b=Math.floor(Math.random()*1e5);
        return `if (${a}*${a}%2==${a%2} and ${b}+${b+1}>${b}) then\n${code}\nend`;
    }

    function antiDebugHeavy(code){
        return `if debug and debug.getinfo then while true do end end\n${code}\npcall(function() if not debug then error() end end)`;
    }

    function stringSplitObf(code){
        let parts=[];
        for(let i=0;i<code.length;i+=13){
            parts.push(code.charCodeAt(i)||32);
        }
        return `-- SPLIT\n${code}`;
    }

    function envLock(code){
        return `local _ENV=setmetatable({},{__index=function(t,k)return _G[k]end,__newindex=error})\n${code}`;
    }

    function mathOpaque(code){
        return `if math.sin(1)*math.cos(1)+math.tan(1)~=nil then\n${code}\nend`;
    }

    function multiLayerVM(code,level){
        let layer1=code;
        for(let i=0;i<layer1.length;i++){}
        let b1=[];
        for(let i=0;i<layer1.length;i++) b1.push(layer1.charCodeAt(i)^0xAA);
        let inner=`load(function(t)local s=''for i=1,#t do s=s..string.char(t[i]~0xAA)end return s end)({${b1.join(',')}})`;
        let b2=[];
        for(let i=0;i<inner.length;i++) b2.push(inner.charCodeAt(i)^0x55);
        let outer=`load(function(t)local s=''for i=1,#t do s=s..string.char(t[i]~0x55)end return s end)({${b2.join(',')}})`;
        if(level==='extreme'){
            let b3=[];
            for(let i=0;i<outer.length;i++) b3.push(outer.charCodeAt(i)^0xFF);
            return `load(function(t)local s=''for i=1,#t do s=s..string.char(t[i]~0xFF)end return s end)({${b3.join(',')}})()`;
        }
        return `pcall(function() return ${outer} end)()`;
    }

    function heavyObfuscate(input,strength){
        let result=input;
        result=heavyRename(result);
        result=xorStringEncode(result);
        result=flattenHeavy(result);
        result=deadCodeHeavy(result);
        result=opaquePredHeavy(result);
        result=antiDebugHeavy(result);
        result=envLock(result);
        result=mathOpaque(result);
        result=stringSplitObf(result);
        for(let i=0;i<3;i++) result=opaquePredHeavy(result);
        result=multiLayerVM(result,strength);
        result=`-- LUARPH GRADE HEAVY OBFUSCATION\n-- VERIFIED USER\n${result}\n-- ANTI-TAMPER CHECK\nif not pcall(function() return 1 end) then error() end`;
        return result;
    }

    function obfuscate(){
        let input=document.getElementById('inputScript').value;
        if(!input.trim()){
            document.getElementById('outputContent').innerText='-- ERROR: empty input';
            return;
        }
        let strength=document.getElementById('heavyLevel').value;
        let obfuscated=heavyObfuscate(input,strength);
        let origSize=new Blob([input]).size;
        let obfSize=new Blob([obfuscated]).size;
        let ratio=(obfSize/origSize).toFixed(2);
        document.getElementById('statsSize').innerText=`Original: ${origSize} B`;
        document.getElementById('statsObfSize').innerText=`Obfuscated: ${obfSize} B`;
        document.getElementById('statsRatio').innerText=`Ratio: ${ratio}x`;
        document.getElementById('outputContent').innerText=obfuscated;
    }

    function copyOutput(){
        let txt=document.getElementById('outputContent').innerText;
        navigator.clipboard.writeText(txt);
        let btn=document.getElementById('copyOutputBtn');
        let old=btn.innerText;
        btn.innerText='✓ COPIED!';
        setTimeout(()=>{btn.innerText=old;},1200);
    }

    function verify(){
        let user=document.getElementById('discordUsername').value.trim();
        if(user.length<2){
            document.getElementById('verifyError').innerText='ERROR: invalid username';
            return;
        }
        localStorage.setItem(VERIFIED_KEY,user);
        document.getElementById('displayUsername').innerText=user;
        document.getElementById('verificationModal').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
    }

    function checkVerification(){
        let saved=localStorage.getItem(VERIFIED_KEY);
        if(saved && saved.length>1){
            document.getElementById('displayUsername').innerText=saved;
            document.getElementById('verificationModal').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
        }
    }

    document.getElementById('verifyBtn').addEventListener('click',verify);
    document.getElementById('obfuscateBtn').addEventListener('click',obfuscate);
    document.getElementById('copyOutputBtn').addEventListener('click',copyOutput);
    checkVerification();
    window.addEventListener('load',()=>{
        let def=document.getElementById('inputScript').value;
        let sz=new Blob([def]).size;
        document.getElementById('statsSize').innerText=`Original: ${sz} B`;
    });
})();
</script>
</body>
</html>
