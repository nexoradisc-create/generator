<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MoonVeil / WeAreDevs Deobfuscator - Debug View</title>
    <style>
        body { background: #0a0a0a; color: #00ffcc; font-family: 'Courier New', monospace; padding: 20px; }
        textarea { width: 100%; height: 200px; background: #111; color: #0f0; border: 1px solid #0ff; font-family: monospace; }
        button { background: #0ff; color: #000; border: none; padding: 10px; cursor: pointer; margin: 5px; }
        pre { background: #111; padding: 10px; border: 1px solid #0ff; overflow-x: auto; white-space: pre-wrap; }
        .debug { color: #ffaa00; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
<h2>MoonVeil / WeAreDevs Deobfuscator - With Step Trace</h2>
<textarea id="input" placeholder="Paste obfuscated Lua here..."></textarea><br>
<button onclick="deobfuscate()">Deobfuscate</button>
<button onclick="clearAll()">Clear</button>
<h3>Result:</h3>
<pre id="output"></pre>
<div class="debug" id="debug"></div>

<script>
    function log(msg) {
        let debugDiv = document.getElementById('debug');
        debugDiv.innerHTML += msg + "<br>";
    }

    function deobfuscate() {
        let code = document.getElementById('input').value;
        let original = code;
        let steps = [];
        document.getElementById('debug').innerHTML = "";
        log("=== Starting deobfuscation ===");

        // STEP 0: Show first 200 chars
        log("Original (first 200): " + original.substring(0,200));

        // STEP 1: Extract ALL base64 strings, not just loadstring patterns
        let allBase64Matches = [];
        let b64Regex = /["']([A-Za-z0-9+\/]{20,}={0,2})["']/g;
        let match;
        while ((match = b64Regex.exec(code)) !== null) {
            allBase64Matches.push({full: match[0], b64: match[1], index: match.index});
        }
        log("Found " + allBase64Matches.length + " potential base64 strings");

        for (let m of allBase64Matches) {
            try {
                let decoded = atob(m.b64);
                if (decoded.length > 5 && decoded.match(/[a-zA-Z0-9\s\(\)]/)) {
                    code = code.replace(m.full, JSON.stringify(decoded));
                    log("Decoded base64: " + m.b64.substring(0,30) + "... → " + decoded.substring(0,50));
                }
            } catch(e) {}
        }

        // STEP 2: Handle nested/concatenated base64
        let prev = "";
        let loopCount = 0;
        while (prev !== code && loopCount < 10) {
            prev = code;
            let nestedMatch = code.match(/["']([A-Za-z0-9+\/]{20,}={0,2})["']/);
            if (nestedMatch) {
                try {
                    let decoded = atob(nestedMatch[1]);
                    if (decoded.length > 10 && decoded !== nestedMatch[1]) {
                        code = code.replace(nestedMatch[1], decoded);
                        log("Nested decode: " + nestedMatch[1].substring(0,30) + " → " + decoded.substring(0,50));
                    }
                } catch(e) {}
            }
            loopCount++;
        }

        // STEP 3: Remove loadstring/load wrappers aggressively
        let wrapperPatterns = [
            /loadstring\(([^)]+)\)\(\)/g,
            /load\(([^)]+)\)\(\)/g,
            /loadstring\(([^)]+)\)/g,
            /load\(([^)]+)\)/g,
            /_G\[["'][^"']+["']\]\(([^)]+)\)\(\)/g
        ];
        for (let pat of wrapperPatterns) {
            let newCode = code.replace(pat, '$1');
            if (newCode !== code) {
                log("Applied wrapper pattern: " + pat.toString().substring(0,50));
                code = newCode;
            }
        }

        // STEP 4: Extract and apply __O__ table
        let objArr = {};
        let objMatch = code.match(/__O__\s*=\s*\{([^}]+)\}/);
        if (objMatch) {
            let content = objMatch[1];
            let items = content.split(',').map(s => s.trim().replace(/^["']|["']$/g, ''));
            for (let i = 0; i < items.length; i++) {
                objArr[i+1] = items[i];
            }
            log("__O__ table size: " + items.length);
            let replaceCount = 0;
            code = code.replace(/__O__\[(\d+)\]/g, (m, idx) => {
                replaceCount++;
                return objArr[parseInt(idx)] || m;
            });
            log("Replaced " + replaceCount + " __O__ references");
        }

        // STEP 5: string.char decoding
        code = code.replace(/string\.char\(([^)]+)\)/g, (m, group) => {
            let nums = group.split(',').map(n => parseInt(n.trim()));
            let str = nums.map(n => String.fromCharCode(n)).join('');
            log("string.char → " + str.substring(0,30));
            return JSON.stringify(str);
        });

        // STEP 6: Hex and octal
        code = code.replace(/\\x([0-9A-Fa-f]{2})/g, (m, hex) => String.fromCharCode(parseInt(hex, 16)));
        code = code.replace(/\\(\d{2,3})/g, (m, oct) => {
            let cp = parseInt(oct, 8);
            return cp <= 255 ? String.fromCharCode(cp) : m;
        });

        // STEP 7: Remove function wrapper
        code = code.replace(/\(\s*function\s*\(\)\s*([\s\S]*?)\s*end\s*\)\s*\(\s*\)/gi, '$1');

        // STEP 8: Final cleanup
        code = code.replace(/__O__\[[^\]]+\]/g, 'nil');
        code = code.replace(/[ \t]+\n/g, '\n');

        if (code === original || code.length < 10) {
            document.getElementById('output').innerText = "// NO CHANGE DETECTED\n// Input may not be MoonVeil/WeAreDevs format\n// Raw input:\n\n" + original;
            log("ERROR: No changes applied");
        } else {
            document.getElementById('output').innerText = "// Deobfuscated:\n" + code;
            log("SUCCESS: Code length changed from " + original.length + " to " + code.length);
        }
    }

    function clearAll() {
        document.getElementById('input').value = "";
        document.getElementById('output').innerText = "";
        document.getElementById('debug').innerHTML = "";
    }
</script>
</body>
</html>
