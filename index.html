<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MoonVeil / WeAreDevs Deobfuscator</title>
    <style>
        body { background: #0a0a0a; color: #00ffcc; font-family: 'Courier New', monospace; padding: 20px; }
        textarea { width: 100%; height: 200px; background: #111; color: #0f0; border: 1px solid #0ff; font-family: monospace; }
        button { background: #0ff; color: #000; border: none; padding: 10px; cursor: pointer; margin: 5px; }
        pre { background: #111; padding: 10px; border: 1px solid #0ff; overflow-x: auto; white-space: pre-wrap; }
    </style>
</head>
<body>
<h2>MoonVeil / WeAreDevs Deobfuscator</h2>
<textarea id="input" placeholder="Paste obfuscated Lua or JS (MoonVeil style) here..."></textarea><br>
<button onclick="deobfuscate()">Deobfuscate</button>
<button onclick="clearAll()">Clear</button>
<h3>Result:</h3>
<pre id="output"></pre>

<script>
    function deobfuscate() {
        let code = document.getElementById('input').value;
        let result = "";

        // Stage 1: Remove base64 wrappers common in MoonVeil
        let b64match = code.match(/loadstring\(decode\("([^"]+)"\)\)/);
        if (!b64match) b64match = code.match(/loadstring\(dec\("([^"]+)"\)\)/);
        if (!b64match) b64match = code.match(/loadstring\(\_G\[.*?\]\("([^"]+)"\)\)/);
        if (b64match) {
            try {
                let decoded = atob(b64match[1]);
                code = decoded;
            } catch(e) { /* keep original */ }
        }

        // Stage 2: Remove loadstring wrappers
        code = code.replace(/loadstring\(([^)]+)\)\(\)/g, '$1');
        code = code.replace(/load\(([^)]+)\)\(\)/g, '$1');

        // Stage 3: Handle WeAreDevs style __O__ array lookups
        let obfArrayMatch = code.match(/local\s+__O__\s*=\s*\{([^}]+)\}/);
        if (obfArrayMatch) {
            let arrayContent = obfArrayMatch[1];
            let elements = arrayContent.split(',').map(s => s.trim().replace(/^["']|["']$/g, ''));
            code = code.replace(/__O__\[(\d+)\]/g, (match, idx) => {
                let i = parseInt(idx);
                return elements[i] || match;
            });
        }

        // Stage 4: Remove string.char obfuscation
        code = code.replace(/string\.char\(([^)]+)\)/g, (match, group) => {
            let nums = group.split(',').map(n => parseInt(n.trim()));
            let chars = nums.map(n => String.fromCharCode(n)).join('');
            return JSON.stringify(chars);
        });

        // Stage 5: Remove (function() ... end)() wrapper if present
        code = code.replace(/^\(\s*function\s*\(\)\s*([\s\S]*?)\s*end\s*\)\s*\(\s*\)/i, '$1');

        // Stage 6: Replace escaped characters
        code = code.replace(/\\x([0-9A-Fa-f]{2})/g, (match, hex) => String.fromCharCode(parseInt(hex, 16)));
        code = code.replace(/\\(\d{3})/g, (match, oct) => String.fromCharCode(parseInt(oct, 8)));

        // Stage 7: Pretty print attempt (basic)
        code = code.replace(/;{2,}/g, ';\n');
        code = code.replace(/\)\{/g, ')\n{');
        code = code.replace(/\}\s*else/g, '} else');

        // Stage 8: Remove redundant __O__ leftovers
        code = code.replace(/__O__\[[^\]]+\]/g, '?');

        if (code === document.getElementById('input').value || code.length < 10) {
            result = "// Could not fully deobfuscate. Here is raw cleaned version:\n" + code;
        } else {
            result = "// Deobfuscated result:\n" + code;
        }

        document.getElementById('output').innerText = result;
    }

    function clearAll() {
        document.getElementById('input').value = "";
        document.getElementById('output').innerText = "";
    }
</script>
</body>
</html>
