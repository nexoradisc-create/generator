<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptBlox Account Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0c12;
            font-family: 'Fira Code', 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #0f1119;
            border-radius: 20px;
            border: 1px solid #2a2f3f;
            overflow: hidden;
        }
        .header {
            background: #080b10;
            padding: 20px 25px;
            border-bottom: 2px solid #00ffaa;
        }
        .header h1 {
            color: #00ffaa;
            font-size: 1.6rem;
            letter-spacing: -1px;
        }
        .header .sub {
            color: #6b7280;
            font-size: 0.75rem;
            margin-top: 6px;
        }
        .controls {
            padding: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            background: #0d0f17;
            border-bottom: 1px solid #1e212c;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .control-group label {
            color: #00ffaa;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
        }
        input, select {
            background: #05070c;
            border: 1px solid #2a2f3f;
            padding: 10px 15px;
            border-radius: 10px;
            color: #00ffaa;
            font-family: monospace;
            outline: none;
        }
        button {
            background: #1e2a3a;
            border: none;
            padding: 10px 22px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            margin-top: 18px;
            transition: 0.2s;
        }
        button:hover {
            background: #00ffaa;
            color: black;
            box-shadow: 0 0 12px #00ffaa;
        }
        .stats-bar {
            padding: 12px 25px;
            background: #0b0d14;
            color: #9ca3af;
            font-size: 0.8rem;
            border-bottom: 1px solid #1e212c;
            display: flex;
            justify-content: space-between;
        }
        .output-area {
            padding: 25px;
            max-height: 500px;
            overflow-y: auto;
        }
        .account-card {
            background: #07090f;
            border-left: 4px solid #00ffaa;
            margin-bottom: 12px;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-family: monospace;
            word-break: break-all;
        }
        .account-card .line {
            margin: 6px 0;
            color: #cbd5e1;
        }
        .account-card .label {
            color: #00ffaa;
            font-weight: bold;
            display: inline-block;
            width: 80px;
        }
        .token-text {
            background: #00000066;
            padding: 4px 8px;
            border-radius: 8px;
            color: #ffaa66;
        }
        .copy-btn {
            background: #1f2a3e;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            color: #00ffaa;
            cursor: pointer;
            margin-left: 12px;
            font-size: 0.7rem;
        }
        .footer {
            padding: 15px;
            text-align: center;
            font-size: 0.65rem;
            color: #4a5568;
            border-top: 1px solid #1e212c;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌀 SCRIPTBLOX · ACCOUNT GENERATOR</h1>
        <div class="sub">multi-IP simulation | randomized credentials + token emulation</div>
    </div>
    <div class="controls">
        <div class="control-group">
            <label>ACCOUNT COUNT</label>
            <input type="number" id="accCount" min="1" max="50" value="5">
        </div>
        <div class="control-group">
            <label>IP SPOOF MODE</label>
            <select id="ipMode">
                <option value="random">RANDOM IP POOL</option>
                <option value="sequential">SEQUENTIAL /24 RANGE</option>
                <option value="tor">TOR EXIT NODE SIM</option>
            </select>
        </div>
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="generateBtn">⚡ GENERATE ACCOUNTS</button>
        </div>
    </div>
    <div class="stats-bar">
        <span id="genStatus">Ready</span>
        <span id="countDisplay">0 accounts generated</span>
    </div>
    <div class="output-area" id="outputArea">
        <div style="color:#6b7280; text-align:center;">Press GENERATE to create accounts with unique IPs, passwords + tokens</div>
    </div>
    <div class="footer">
        ⚠️ SIMULATION MODE — No real ScriptBlox accounts created. All data is locally generated mock.
    </div>
</div>

<script>
    (function() {
        const accCountInput = document.getElementById('accCount');
        const ipModeSelect = document.getElementById('ipMode');
        const generateBtn = document.getElementById('generateBtn');
        const outputArea = document.getElementById('outputArea');
        const genStatusSpan = document.getElementById('genStatus');
        const countDisplaySpan = document.getElementById('countDisplay');

        // Mock IP pools (different origin IPs for "different ips" requirement)
        const randomIpPool = [
            "45.33.22.11", "185.142.53.24", "103.48.14.77", "202.61.88.12", "91.121.55.89",
            "178.32.211.16", "5.135.76.33", "104.28.12.5", "172.67.200.1", "188.166.23.9",
            "159.89.185.30", "51.79.68.122", "139.59.101.89", "165.227.56.12", "167.71.237.14"
        ];

        function getRandomIpFromPool() {
            return randomIpPool[Math.floor(Math.random() * randomIpPool.length)];
        }

        function getSequentialIp(index) {
            const baseA = 192 + (index % 63);
            const baseB = 168 + (index % 40);
            const baseC = (index % 254) + 1;
            const baseD = (index % 253) + 1;
            return `${baseA}.${baseB}.${baseC}.${baseD}`;
        }

        function getTorSimIp() {
            const torOct1 = [ 45, 80, 109, 185, 193 ][Math.floor(Math.random() * 5)];
            const torOct2 = Math.floor(Math.random() * 255);
            const torOct3 = Math.floor(Math.random() * 255);
            const torOct4 = Math.floor(Math.random() * 255);
            return `${torOct1}.${torOct2}.${torOct3}.${torOct4}`;
        }

        function generateRandomUsername(baseIndex) {
            const prefixes = ["blox", "script", "void", "nexus", "phantom", "crypt", "alpha", "omega", "zeta", "neon"];
            const suffixes = ["_god", "_x", "_hax", "_real", "_token", "_acc", "_pro", "_edge", "_v2", "_zz"];
            const randNum = Math.floor(Math.random() * 9000) + 1000;
            const prefix = prefixes[baseIndex % prefixes.length];
            const suffix = suffixes[Math.floor(Math.random() * suffixes.length)];
            return `${prefix}${randNum}${suffix}`;
        }

        function generateRandomPassword() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
            let pwd = '';
            for (let i = 0; i < 14; i++) {
                pwd += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return pwd;
        }

        function generateToken(username, ipUsed, timestamp) {
            // mock token generator - simulates JWT style
            const b64part = btoa(`${username}:${ipUsed}:${timestamp}`).substring(0, 32);
            const randomSuffix = Math.random().toString(36).substring(2, 12);
            return `sb_tk_${b64part}${randomSuffix}`;
        }

        function copyToClipboard(text, btnElement) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btnElement.innerText;
                btnElement.innerText = "✓ COPIED";
                setTimeout(() => {
                    btnElement.innerText = originalText;
                }, 1500);
            }).catch(() => {
                btnElement.innerText = "FAIL";
            });
        }

        function renderAccounts(accounts) {
            if (!accounts.length) {
                outputArea.innerHTML = '<div style="color:#6b7280; text-align:center;">No accounts generated.</div>';
                return;
            }
            let html = '';
            for (let i = 0; i < accounts.length; i++) {
                const acc = accounts[i];
                html += `
                    <div class="account-card" id="acc-${i}">
                        <div class="line"><span class="label">🌐 IP:</span> ${acc.ip} <span style="color:#6b7280;">(generator used)</span></div>
                        <div class="line"><span class="label">👤 USER:</span> ${acc.username}</div>
                        <div class="line"><span class="label">🔑 PWD:</span> ${acc.password} 
                            <button class="copy-btn" data-copy="${acc.password}" data-type="pwd">Copy Pwd</button>
                        </div>
                        <div class="line"><span class="label">🎫 TOKEN:</span> <span class="token-text">${acc.token}</span>
                            <button class="copy-btn" data-copy="${acc.token}" data-type="token">Copy Token</button>
                        </div>
                        <div class="line"><span class="label">⏱️ CREATED:</span> ${acc.timestamp}</div>
                    </div>
                `;
            }
            outputArea.innerHTML = html;
            
            // attach copy handlers
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const copyValue = btn.getAttribute('data-copy');
                    if (copyValue) {
                        copyToClipboard(copyValue, btn);
                    }
                });
            });
        }

        function generateAccounts() {
            let count = parseInt(accCountInput.value, 10);
            if (isNaN(count)) count = 5;
            if (count < 1) count = 1;
            if (count > 50) count = 50;
            accCountInput.value = count;
            
            const mode = ipModeSelect.value;
            const accounts = [];
            const timestampBase = Date.now();
            
            for (let i = 0; i < count; i++) {
                let ipUsed = "";
                if (mode === "random") {
                    ipUsed = getRandomIpFromPool();
                } else if (mode === "sequential") {
                    ipUsed = getSequentialIp(i + 1);
                } else { // tor mode
                    ipUsed = getTorSimIp();
                }
                
                const username = generateRandomUsername(i);
                const password = generateRandomPassword();
                const uniqueTimestamp = timestampBase + i;
                const token = generateToken(username, ipUsed, uniqueTimestamp);
                
                accounts.push({
                    ip: ipUsed,
                    username: username,
                    password: password,
                    token: token,
                    timestamp: new Date(uniqueTimestamp).toISOString().replace('T', ' ').substring(0, 19)
                });
            }
            
            renderAccounts(accounts);
            genStatusSpan.innerText = `✅ Generated ${accounts.length} accounts (mock)`;
            countDisplaySpan.innerText = `${accounts.length} accounts · ${mode} IP mode`;
            
            // log to console for debug
            console.log("[GENERATOR] Accounts created (simulated):", accounts.map(a => ({user: a.username, ip: a.ip})));
        }
        
        generateBtn.addEventListener('click', generateAccounts);
        
        // initial demo generation
        generateAccounts();
    })();
</script>
</body>
</html>
